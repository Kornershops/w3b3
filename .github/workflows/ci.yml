name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: w3b3_test
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: cd backend && npx prisma generate

      - name: Lint code
        run: npm run lint --workspaces --if-present

      - name: Type check
        run: npm run type-check --workspaces --if-present

      - name: Backend Tests
        run: |
          cd backend
          npm run build
          npm run test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/w3b3_test
          REDIS_URL: redis://localhost:6379
          CI: true
          NO_COLOR: 1

      - name: Contract Tests
        run: |
          cd contracts
          npx hardhat telemetry --disable
          yes n | npm run test
        env:
          CI: true
          NO_COLOR: 1
          HARDHAT_DISABLE_TELEMETRY: 1

      - name: Frontend Tests
        run: |
          cd frontend
          npm run test
        env:
          CI: true
          NO_COLOR: 1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      - name: Build All
        run: |
          cd backend && npm run build
          cd ../frontend && npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
