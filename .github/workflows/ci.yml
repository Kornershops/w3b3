name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Compile contracts
        run: npm run compile --workspace=contracts
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      - name: Lint
        run: npm run lint --workspaces --if-present
      - name: Type check
        run: npm run type-check --workspaces --if-present

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: w3b3_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      - name: Backend Tests
        run: |
          echo "🚀 Starting Backend Tests..."
          cd backend
          npm run build
          npm run test
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/w3b3_test
          REDIS_URL: redis://localhost:6379
          CI: true
          NO_COLOR: 1

  test-contracts:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Contract Tests
        run: |
          echo "🚀 Starting Contract Tests..."
          cd contracts
          npx hardhat compile
          npx hardhat telemetry --disable
          REPORT_GAS=false npx hardhat test
        env:
          CI: true
          NO_COLOR: 1
          REPORT_GAS: false
          HARDHAT_DISABLE_TELEMETRY: 1

  test-frontend:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Frontend Tests
        run: |
          echo "🚀 Starting Frontend Tests..."
          cd frontend
          npm run test
        env:
          CI: true
          NO_COLOR: 1

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-contracts, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm install
      - name: Generate Prisma Client
        run: cd backend && npx prisma generate
      - name: Build All
        run: |
          cd backend && npm run build
          cd ../frontend && npm run build

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true
